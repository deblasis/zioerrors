name: CI

on:
  push:
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v1
        with:
          version: "0.15.2"
      - name: zig fmt
        run: zig fmt --check src tests examples build.zig
      - name: zig build test
        run: zig build test --summary all
